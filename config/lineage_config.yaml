# Lineage visualization configuration per pipeline-project.
#
# inherit: copy another pipeline's config as base (optional).
# phases: ordered list of phases to render as columns.
#   name:        directory name under executions/ (e.g. f01_explore)
#   label:       display label for the column header
#   parent_keys: YAML path(s) inside params.yaml that hold the parent variant id(s).
#                Use a list of keys for nested paths, e.g. ["parameters", "parent_variant"].
#                Multiple entries are tried in order; first non-null wins.
#   metadata:    filename(s) to search for inside the variant directory.
#                Supports both .yml and .yaml extensions automatically.
#   color:       bg / border / text CSS color values for the column.

pipelines:

  testPipelineEpoch:
    phases:
      - name: f01_explore
        label: "F01 Explore"
        parent_keys: []
        metadata: ["metadata.yaml"]
        color: {bg: "#E3F2FD", border: "#90CAF9", text: "#1565C0"}

      - name: f02_events
        label: "F02 Events"
        parent_keys: ["parent"]
        metadata: ["metadata.yaml"]
        color: {bg: "#E8F5E9", border: "#A5D6A7", text: "#2E7D32"}

      - name: f03_windows
        label: "F03 Windows"
        parent_keys: [["parameters", "parent_variant"]]
        metadata: ["metadata.yaml"]
        color: {bg: "#FFF3E0", border: "#FFCC80", text: "#EF6C00"}

      - name: f04_targets
        label: "F04 Targets"
        parent_keys: [["parameters", "parent_variant"]]
        metadata: ["metadata.yaml"]
        color: {bg: "#F3E5F5", border: "#CE93D8", text: "#6A1B9A"}

      - name: f05_modeling
        label: "F05 Modeling"
        parent_keys: [["parameters", "parent_variant"]]
        metadata: ["metadata.yaml"]
        color: {bg: "#FFEBEE", border: "#EF9A9A", text: "#C62828"}

      - name: f06_quant
        label: "F06 Quant"
        parent_keys: [["parameters", "parent_variant"]]
        metadata: ["metadata.yaml"]
        color: {bg: "#E0F7FA", border: "#80DEEA", text: "#006064"}

      - name: f07_modval
        label: "F07 ModVal"
        parent_keys: [["parameters", "parent_variant"]]
        metadata: ["metadata.yaml"]
        color: {bg: "#ECEFF1", border: "#B0BEC5", text: "#37474F"}

      - name: f08_sysval
        label: "F08 SysVal"
        parent_keys: [["parameters", "parents"]]
        metadata: ["metadata.yaml"]
        color: {bg: "#F9FBE7", border: "#E6EE9C", text: "#827717"}

  testPipelineEpoch_v3:
    inherit: testPipelineEpoch

  testPipelineEpoch_v4:
    inherit: testPipelineEpoch
