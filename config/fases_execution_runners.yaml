# Shared runner definitions — used by all pipelines.
# Phase → runner assignment lives in config/<pipeline>/fase_runners.yaml.

runners:
  - GithubActions:
    # max-parallel: 2
    max-parallel: 20
    labels: [ubuntu-latest]
  - ESP32-v1:
    labels: [self-hosted, Linux, X64, self-hosted-tehelab, esp32v1]
    max-parallel: 1
  - ESP32-v2:
    labels: [self-hosted, Linux, X64, self-hosted-tehelab, esp32v2]
    max-parallel: 1
  - ESP32-v3-virtual:
    labels: [self-hosted, Linux, X64, self-hosted-tehelab, esp32v3]
    max-parallel: 1
  - ESP32-v4-virtual:
    labels: [self-hosted, Linux, X64, self-hosted-tehelab, esp32v4]
    max-parallel: 1
  - Local:
    max-parallel: 1
    labels: [local]
  - K8s-8gb:
    max-parallel: 5
    labels: [runner-8gb]
  - K8s-24gb:
    max-parallel: 3
    labels: [runner-24gb]


url_ctrl_runners: "https://github.com/organizations/TeheORG/settings/actions/runners"