# Local runner workflow steps for mlops4rtedgeUni.
# Commands are aligned with external/mlops4rtedgeUni/repo_actions/Makefile.

fases:
- fase: f01_explore
  exclude_exts:
  - .h5
  - .parquet
  - .tflite
  dvc_pull:
  - data/raw.csv.dvc
  steps:
  - name: Ejecutar variant1
    type: make
    cmd: make variant1 VARIANT={variant_id} {make_params}
    step_id: variant
    publish_pr: true
    commit_paths:
    - executions/f01_explore/{variant_id}
  - name: Ejecutar script1
    type: make
    cmd: make script1 VARIANT={variant_id}
    step_id: script
    publish_pr: true
    commit_paths:
    - executions/f01_explore/{variant_id}
  - name: Ejecutar check1
    type: make
    cmd: make check1 VARIANT={variant_id}
    step_id: check
    always_run: true
    publish_pr: true
    commit_paths:
    - executions/f01_explore/{variant_id}
  - name: Ejecutar register1
    type: make
    cmd: make register1 VARIANT={variant_id}
    step_id: register
    publish_pr: true
    commit_paths:
    - executions/f01_explore/{variant_id}
    - .dvc/config
    - dvc.yaml
    - dvc.lock
- fase: f02_events
  exclude_exts:
  - .h5
