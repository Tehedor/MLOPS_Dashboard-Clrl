# Pipeline-project registry.
# Each entry defines one pipeline-project identified by a short slug.
# Global settings (runners, phases config, terminal, queue) live in config/config.yaml.
#
# Convention: declare `external_base` and all paths are derived automatically:
#   <external_base>/repo_actions/              → cloned GitHub repo (results, lineage)
#   <external_base>/repo_actions/executions/   → execution artifacts
#   <external_base>/repo_actions/analisis_files/
#   <external_base>/repo_actions/scripts/traceability_schema.yaml
#   <external_base>/repo_local_runner/         → local runner workspace
#
# traceability_path: explicit path to the traceability schema for this pipeline.
#   Defaults to <external_base>/repo_actions/scripts/traceability_schema.yaml.
#   Override here to point to a different file (e.g. for debugging or a shared schema).
#
# init_marker: path relative to actions_repo_local_path that signals the pipeline
#              is already initialized (skip "Configurar pipeline" button if it exists).
#              Accepts a file or directory. Default: ".mlops4ofp"
#
# data_ctrl: lista de ficheros a inyectar en el repo clonado ANTES de ejecutar command_start.
#   src: ruta relativa al raíz de ESTE repo (app_ctrl_v2/) — el dashboard/controlador
#   dst: ruta relativa al raíz del repo clonado (actions_repo_local_path) — el repo externo
#   NOTA: src y dst pueden tener el mismo valor textual pero apuntan a capas distintas:
#     src resuelve como →  app_ctrl_v2/<src>
#     dst resuelve como →  app_ctrl_v2/<external_base>/repo_actions/<dst>

