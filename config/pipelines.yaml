  mlops4rtedge:
    label: "MLOps4RTEdge" #Nombre declarativo
    color: "#ef4444"
    repo: "TeheORG/mlops4rtedge" # Repo de github
    branch: "test"
    external_base: "external/mlops4rtedge" # Dirección de almacenamiento
    validation_mode: true
    traceability_path: "external/mlops4rtedge/repo_actions/scripts/traceability_schema.yaml"
    init_marker: ".mlops4ofp" # Verificador de que existe la pipeline-rama-repo
    command_start: "make setup-branch SETUP_CFG=setup/remote3.yaml DATA_FILE=data/raw.csv"
    data_ctrl:
      - src: "data/raw.csv"   # app_ctrl_v2/data/mlops4rtedge/raw.csv
        dst: "data/raw.csv"                 # external/mlops4rtedge/repo_actions/data/raw.csv
    mlflow_tracking_uri: "https://dagshub.com/Tehedor/mlops4rtedge.mlflow"
    dagshub_repository: "https://dagshub.com/Tehedor/mlops4rtedge"
    github_token_env: "GITHUB_TOKEN_EDGE"
    table_config: "config/mlops4rtedge/table_config.yaml"
    local_workflows: "config/mlops4rtedge/local_workflows.yaml"
    services_external_ctrl: "config/mlops4rtedge/services_external_ctrl.yaml"
    fase_runners: "config/mlops4rtedge/fase_runners.yaml"
    lineage_config: "config/mlops4rtedge/lineage_config.yaml"
  
