    traceability_path: "external/testPipelineEpoch_v3/repo_actions/scripts/traceability_schema.yaml"
    init_marker: ".mlops4ofp"
    command_start: "make setup SETUP_CFG=setup/remote2.yaml"
    mlflow_tracking_uri: "https://dagshub.com/Tehedor/MLOps_actions_v2.mlflow"
    dagshub_repository: "https://dagshub.com/Tehedor/MLOps_actions_v2"

  testPipelineEpoch_v4:
